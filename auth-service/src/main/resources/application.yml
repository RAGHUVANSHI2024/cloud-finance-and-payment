        name: auth-service

    datasource:
      url: jdbc:mysql://localhost:3306/auth_db
      driver-class-name: com.mysql.cj.jdbc.Driver
      username: root
      password: mysql

    jpa:
      hibernate:
         ddl-auto: update
      show-sql: true    

